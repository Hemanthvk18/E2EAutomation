name: Monthly Allure Execution

on:
  schedule:
    - cron: "59 18 28-31 * *"

env:
  EMAIL: ${{ secrets.EMAIL }}
  PASSWORD: ${{ secrets.PASSWORD }}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Validate Credentials
        run: |
          if [ -z "${{ secrets.EMAIL }}" ] || [ -z "${{ secrets.PASSWORD }}" ]; then
            echo "❌ ERROR: EMAIL or PASSWORD secrets not configured in GitHub!"
            exit 1
          fi
          echo "✅ Credentials validated"

      - uses: browser-actions/setup-chrome@latest

      - name: Run Initial Tests
        run: |
          set +e
          mvn clean test \
          -Denv="dev" \
          -Durl="https://rahulshettyacademy.com/client" \
          -Dbrowser="chrome" \
          -Dcucumber.filter.tags="@Regression" \
          -DEMAIL="${{ env.EMAIL }}" \
          -DPASSWORD="${{ env.PASSWORD }}" \
          -DfailIfNoTests=false
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}

      - name: Rerun Failed Tests
        if: always() && hashFiles('target/rerun.txt') != ''
        run: |
          set +e
          mvn test -Dtest=testrunner.RerunFailedTestNgRunner \
          -DEMAIL="${{ env.EMAIL }}" \
          -DPASSWORD="${{ env.PASSWORD }}" \
          -DfailIfNoTests=false
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}

      - name: Generate Allure Report
        if: always()
        run: |
          mvn allure:report -DfailOnMissingWebDriver=false

      - name: Deploy to gh-pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/site/allure-maven-plugin
          publish_branch: gh-pages
          keep_files: true
          cname: ""
