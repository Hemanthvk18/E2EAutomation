name: Manual Allure Execution

on:
  workflow_dispatch:
    inputs:
      env:
        required: true
        default: "dev"
      url:
        required: true
        default: "https://rahulshettyacademy.com/client"
      browser:
        required: true
        default: "chrome"
      tags:
        required: true
        default: "@Regression"

env:
  EMAIL: ${{ secrets.EMAIL }}
  PASSWORD: ${{ secrets.PASSWORD }}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      # ✅ Install Chrome properly with dependencies
      - name: Install Chrome & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip xvfb libxi6 libgconf-2-4
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt install ./google-chrome-stable_current_amd64.deb -y

      # ✅ Validate secrets
      - name: Validate Credentials
        run: |
          if [ -z "${{ secrets.EMAIL }}" ] || [ -z "${{ secrets.PASSWORD }}" ]; then
            echo "❌ ERROR: EMAIL or PASSWORD secrets not configured!"
            exit 1
          fi
          echo "✅ Credentials validated"

      # ✅ Run tests (do not fail pipeline)
      - name: Run Initial Tests
        continue-on-error: true
        run: |
          xvfb-run mvn clean test \
          -Denv="${{ github.event.inputs.env }}" \
          -Durl="${{ github.event.inputs.url }}" \
          -Dbrowser="${{ github.event.inputs.browser }}" \
          -Dcucumber.filter.tags="${{ github.event.inputs.tags }}" \
          -DEMAIL="${{ env.EMAIL }}" \
          -DPASSWORD="${{ env.PASSWORD }}" \
          -DfailIfNoTests=false

      # ✅ Rerun failed tests
      - name: Rerun Failed Tests
        if: always() && hashFiles('target/rerun.txt') != ''
        continue-on-error: true
        run: |
          xvfb-run mvn test \
          -Dtest=testrunner.RerunFailedTestNgRunner \
          -DEMAIL="${{ env.EMAIL }}" \
          -DPASSWORD="${{ env.PASSWORD }}" \
          -DfailIfNoTests=false

      # ✅ Upload reports (VERY IMPORTANT for debugging)
      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

      # ✅ Generate Allure report
      - name: Generate Allure Report
        if: always()
        run: |
          mvn allure:report

      # ✅ Deploy Allure report
      - name: Deploy to gh-pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/site/allure-maven-plugin
          publish_branch: gh-pages
          keep_files: true