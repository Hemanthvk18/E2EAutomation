name: Manual Allure Execution

on:
  workflow_dispatch:
    inputs:
      env:
        required: true
        default: "dev"
      url:
        required: true
        default: "https://rahulshettyacademy.com/client"
      browser:
        required: true
        default: "chrome"
      tags:
        required: true
        default: "@Regression"

env:
  EMAIL: ${{ secrets.EMAIL }}
  PASSWORD: ${{ secrets.PASSWORD }}

permissions:
  contents: write

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@latest

      # 🔍 DEBUG (VERY IMPORTANT - TEMPORARY)
      - name: Debug Project Structure
        run: ls -R

      - name: Run Tests
        run: |
          mvn clean test \
          -Denv="${{ github.event.inputs.env }}" \
          -Durl="${{ github.event.inputs.url }}" \
          -Dbrowser="${{ github.event.inputs.browser }}" \
          -Dcucumber.filter.tags="${{ github.event.inputs.tags }}" \
          -DEMAIL="${EMAIL}" \
          -DPASSWORD="${PASSWORD}"

      # 🔥 FIX: Tell Allure where results are located
      - name: Generate Allure Report
        run: |
          mvn allure:report \
          -Dallure.results.directory=E2EAutomation/allure-results

      # 🔍 DEBUG (Check report generated)
      - name: Verify Allure Report
        run: ls -R target/site/allure-maven-plugin

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/site/allure-maven-plugin
          publish_branch: gh-pages
          force_orphan: true