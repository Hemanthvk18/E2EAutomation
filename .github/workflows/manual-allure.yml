name: Manual Allure Execution

on:
  workflow_dispatch:
    inputs:
      env:
        required: true
        default: "dev"
      url:
        required: true
        default: "https://rahulshettyacademy.com/client"
      browser:
        required: true
        default: "chrome"
      tags:
        required: true
        default: "@Regression"

env:
  EMAIL: ${{ secrets.EMAIL }}
  PASSWORD: ${{ secrets.PASSWORD }}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      # ✅ Chrome already available
      - name: Verify Chrome
        run: google-chrome --version

      - name: Validate Credentials
        run: |
          if [ -z "${{ secrets.EMAIL }}" ] || [ -z "${{ secrets.PASSWORD }}" ]; then
            echo "❌ ERROR: EMAIL or PASSWORD not set!"
            exit 1
          fi

      # ✅ Ensure allure folder exists
      - name: Create Allure Results Directory
        run: mkdir -p target/allure-results

      # ✅ Run tests
      - name: Run Initial Tests
        continue-on-error: true
        run: |
          xvfb-run mvn clean test \
          -Denv="${{ github.event.inputs.env }}" \
          -Durl="${{ github.event.inputs.url }}" \
          -Dbrowser="${{ github.event.inputs.browser }}" \
          -Dcucumber.filter.tags="${{ github.event.inputs.tags }}" \
          -DEMAIL="${{ env.EMAIL }}" \
          -DPASSWORD="${{ env.PASSWORD }}"

      # ✅ Rerun failed
      - name: Rerun Failed Tests
        if: always() && hashFiles('target/rerun.txt') != ''
        continue-on-error: true
        run: |
          xvfb-run mvn test \
          -Dtest=testrunner.RerunFailedTestNgRunner

      # ✅ Debug folder
      - name: Debug Allure Results
        if: always()
        run: ls -R target

      # ✅ Generate report ONLY if results exist
      - name: Generate Allure Report
        if: always() && hashFiles('target/allure-results/**') != ''
        run: mvn allure:report

      # ✅ Upload reports (backup)
      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: target/

      # ✅ Deploy
      - name: Deploy to gh-pages
        if: always() && hashFiles('target/site/allure-maven-plugin/**') != ''
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/site/allure-maven-plugin
          publish_branch: gh-pages