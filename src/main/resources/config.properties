# Application URL
url=https://rahulshettyacademy.com/client

# Browser type
browser=chrome
# Options: chrome, firefox, edge

# Execution mode
execution=local
# Options: local, grid

# Headless mode (optional)
headless=true

# Environment
env=dev
# Options: dev, int, stg, prod


# Capability defaults
# User Pool Configuration
# Maps capability tags to default user categories
admin.default.category=test_admin
normal_admin_only.default.category=normal_admin
test_user.default.category=test_normal

# Capability to category mappings (which tags map to which categories)
admin.categories=test_admin,normal_admin
normal_admin_only.categories=normal_admin
test_user.categories=test_normal

#User definitions - comma-separated user keys for each category
test_admin.users=TEST_ADMIN1,TEST_ADMIN2,TEST_ADMIN3,TEST_ADMIN4

# Normal admin users for administrative tasks
normal_admin.users=NORMAL_ADMIN1,NORMAL_ADMIN2

# Test normal users for regular user testing
test_normal.users=TEST_USER1,TEST_USER2,TEST_USER3
